# Projects in development: the creative-universe work this engine feeds
# or sits beside. The Projects page promotes these. Honest tense: status
# says where each really is; descriptions stay plain and conditional, no
# overstating unbuilt work as finished.
#
# status:  live | development | design | concept
# Edit freely; add a project as a new block.

projects:
