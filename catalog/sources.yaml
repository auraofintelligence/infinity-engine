# Where model candidates come from, beyond the automated HF-likes scan.
# Three kinds of signal, used together: leaderboards rank quality,
# trusted channels catch what practitioners are shipping before it charts,
# community/discovery surfaces the raw new stuff. The Recon page lists
# these; the funnel is: discover -> rank -> vet on your own footage.
#
# type: leaderboard | channel | community
# Verify links occasionally; boards rebrand and channels move.

sources:
  # ---- leaderboards (quality / preference) ----
  - name: LMArena
    type: leaderboard
    category: llm, image
    url: https://lmarena.ai/
    note: Human-preference Elo for LLMs, with image and vision arenas.
  - name: Artificial Analysis
    type: leaderboard
    category: llm, video, tts
    url: https://artificialanalysis.ai/
    note: Quality vs speed vs price across LLMs, plus video and speech arenas.
  - name: LiveBench
    type: leaderboard
    category: llm
    url: https://livebench.ai/
    note: Contamination-resistant LLM scoring, refreshed over time.
  - name: VBench
    type: leaderboard
    category: video
    url: https://huggingface.co/spaces/Vchitect/VBench_Leaderboard
    note: The standard open benchmark leaderboard for video generation.
  - name: imgsys
    type: leaderboard
    category: image
    url: https://imgsys.org/
    note: Blind A/B image-model arena (by fal).
  - name: TTS Arena
    type: leaderboard
    category: tts
    url: https://huggingface.co/spaces/TTS-AGI/TTS-Arena
    note: Blind A/B voice-preference ranking for text-to-speech.
  - name: Open ASR Leaderboard
    type: leaderboard
    category: stt
    url: https://huggingface.co/spaces/hf-audio/open_asr_leaderboard
    note: The authoritative WER ranking for speech-to-text.
  - name: MTEB
    type: leaderboard
    category: embeddings
    url: https://huggingface.co/spaces/mteb/leaderboard
    note: The canonical embedding-model benchmark (where the Qwen3-Embedding pick came from).

  # ---- trusted channels (practitioner signal, ahead of the boards) ----
  - name: Theoretically Media
    type: channel
    category: video, film
    url: https://www.youtube.com/@TheoreticallyMedia
    note: Tim Simmons tests AI video/image/audio tools honestly in real production; no tool-of-the-week hype.
  - name: Curious Refuge
    type: channel
    category: video, film
    url: https://www.youtube.com/@curiousrefuge
    note: AI filmmaking school and news; workflows, shorts and the weekly AI-film roundup.
  - name: Aitrepreneur
    type: channel
    category: image, video, tts, llm
    url: https://www.youtube.com/@Aitrepreneur
    note: "Broad, hands-on open/local model coverage: Stable Diffusion, LoRA training, voice cloning, local LLMs, including uncensored and NSFW open models. Not just one category."

  # ---- community / discovery (raw new releases) ----
  - name: Hugging Face Trending
    type: community
    category: all
    url: https://huggingface.co/models?sort=trending
    note: What the recon watcher already taps; popularity, not quality.
  - name: Papers with Code
    type: community
    category: all
    url: https://paperswithcode.com/sota
    note: State-of-the-art tables per task, with linked code.
  - name: r/LocalLLaMA
    type: community
    category: llm
    url: https://www.reddit.com/r/LocalLLaMA/
    note: Fast community signal on new open models and quantised builds.
  - name: r/StableDiffusion
    type: community
    category: image, video
    url: https://www.reddit.com/r/StableDiffusion/
    note: Community signal on image/video models, LoRAs and ComfyUI workflows.
