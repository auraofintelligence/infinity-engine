# Model registry: the candidate and adopted open-weight models per
# category. The model picker page reads this. The recon watcher
# (tools/watch_models.py) proposes additions into recon-queue.yaml;
# vetted winners get promoted in here by hand.
#
# status:  active   in the working stack
#          recon    flagged, being tested in the Recon lane
#          watching on the radar, not yet tested
# comfy:   first-class ComfyUI support (yes/no/partial)
# likes:   approximate Hugging Face likes at last check (the watcher
#          refreshes these); a rough hype signal, not gospel.
# Researched 2026-07-20; re-verify on the next dated scan.

