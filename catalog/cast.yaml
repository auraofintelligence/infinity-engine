  # ---- community mascots (education + marketing for local clubs) ----
  - id: finnius
    name: Finnius
    troupe: mascots
    role: mascot / educator
    represents: dolphin (Point Lookout Fishing Club)
    status: concept
    summary: The Point Lookout Fishing Club's dolphin mascot; fishing know-how, marine care and club marketing. Luke is PLFC secretary; the club is dormant until he returns to it.
  - id: mozzie
    name: Mozzie
    troupe: mascots
    role: mascot / hype
    represents: mosquito (Sandy Sports Club)
    status: concept
    summary: The Sandy Sports Club's cheeky mosquito mascot, a nod to Minjerribah meaning place of mosquito; sport, health and event marketing.
    ref_image: mozzie.png
    design: >
      Friendly Pixar-style anthropomorphic mosquito. Warm brown body,
      two long curved antennae, big round expressive dark-brown eyes, a
      long slender proboscis with a light tan tip. Two arms, two legs,
      four-fingered white cartoon gloves, a pair of pale translucent
      wings. Wears an orange sleeveless singlet reading STRADDIE in cream
      caps and navy blue shorts. Confident hands-on-hips stance, beach
      setting (sand, blue ocean, clear sky). Palette: orange singlet,
      navy shorts, warm brown skin, white gloves, pale wings. (Reference
      look from Luke's own WhatsApp sample, 2026; concept, not yet locked.)
