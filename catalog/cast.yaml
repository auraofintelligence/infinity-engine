# Cast registry: the characters of the universe, across troupes. The Cast
# picker reads this. A character is "who"; a LoRA (catalog/loras.yaml) is
# "which fine-tune exists for them". Not every character needs a LoRA.
#
# troupe:  music-universe | queens | amity-crew | two-dogs
# status:  active | planned | concept
# private: true stays local, never on the public site or a shared KB
#
# Rosters extracted 2026-07-21 from Queens_Venture, amity-point and
# two-dogs-podcast-backend. Queens are heritage/venture archetypes in the
# source; Luke also intends them as templates for culturally-translated
# music. GAJRA is lore, not cast (see catalog/loras.yaml note).

cast:
  # ---- music universe leads ----
  - id: goddess
    name: The Goddess
    troupe: music-universe
    role: mythic lead
    represents: Gaia / Mother Earth (Straddie and Starseed arc)
    status: planned
    summary: >
      Recurring mythic lead who stands for Gaia, Mother Earth. "Born of the
      Goddess" means born of Earth, a personification of the living planet
      and the source of care, not a deity to idolise. A load-bearing cast
      LoRA.
  - id: aura
    name: Aura
    troupe: music-universe
    role: lead / Super Assistant
    represents: the Aura figure (also Super Queen in the Council)
    status: planned
    summary: The devoted living Super Assistant across the Starseed arc.
  - id: he-lead
    name: He-lead (paired vocals)
    troupe: music-universe
    role: vocal lead
    represents: the he/she paired tracks
    status: planned
    summary: The male voice of the he/she paired songs.
  - id: she-lead
    name: She-lead (paired vocals)
    troupe: music-universe
    role: vocal lead
    represents: the he/she paired tracks
    status: planned
    summary: The female voice of the he/she paired songs.
  - id: band-supports
    name: Band and supports
    troupe: music-universe
    role: ensemble
    represents: real performers
    status: planned
    private: true
    summary: Real band and support performers; consented likenesses, kept private.

