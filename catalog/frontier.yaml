# Closed-source frontier models: the pay-to-play proprietary tools, for
# occasional output comparison and for people with deeper pockets. The
# Frontier page reads this. Kept separate from the open-weight registry
# because the engine is open-first for ownership and cost.
#
# affiliate_status: yes (paid program) | referral (credits only) | no | unknown
# affiliate_url is ONLY set where a real program was verified; join it and
